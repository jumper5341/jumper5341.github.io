<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Анти-Москиты</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .title {
    color: white;
    font-family: Arial, sans-serif;
    font-size: 3vw;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  #timer {
    font-family: Arial, sans-serif;
    font-size: 12vw;
    color: red;
    letter-spacing: 5px;
    text-shadow:
      0 0 20px red,
      0 0 40px red,
      0 0 80px darkred;
  }
</style>
</head>

<body>

<div class="title">ДО ВЫБОРОВ ОСТАЛОСЬ</div>
<div id="timer">⠀</div>

<script>
  const targetDate = new Date(new Date().getFullYear(), 5, 6, 0, 0, 0).getTime();

  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);

    const days = Math.floor(totalSeconds / (3600 * 24));
    const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return `${days}д ${String(hours).padStart(2,"0")}:` +
           `${String(minutes).padStart(2,"0")}:` +
           `${String(seconds).padStart(2,"0")}`;
  }

  const timer = document.getElementById("timer");

  const interval = setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
      clearInterval(interval);
      timer.textContent = "00:00:00:00";
      return;
    }

    timer.textContent = formatTime(distance);
  }, 1000);
</script>

</body>
</html>
